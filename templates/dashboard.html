<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comprehensive Dashboard</title>

  <style>
    /* ===== BACKGROUND VIDEO ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: #000;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.75);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    /* ===== PAGE TITLE ===== */
    h2 {
      text-align: center;
      color: #ffdddd;
      font-size: 2.3rem;
      margin-top: 30px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    /* ===== MAIN GLASS PANEL ===== */
    .container {
      background: rgba(255,255,255,0.10);
      border-radius: 16px;
      max-width: 850px;
      width: 92%;
      margin: 40px auto;
      padding: 34px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 35px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      animation: fadeUp 1.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== TABLE STYLING ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.12rem;
      margin-top: 24px;
      color: #fff;
    }

    th {
      background: rgba(255,230,230,0.15);
      color: #ffcccc;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      font-size: 1.1rem;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover td {
      background: rgba(255,255,255,0.12);
      transition: 0.2s;
    }

    /* ===== BUTTON ===== */
    .btn {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      padding: 12px 26px;
      background: linear-gradient(135deg, #d10000, #7a0000);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.08rem;
      box-shadow: 0 6px 22px rgba(0,0,0,0.45);
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.03);
      background: linear-gradient(135deg, #ff3333, #9e0000);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

  </style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
 <video autoplay muted loop playsinline class="bg-video">
  <source src="static/Blood_video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<!-- PAGE TITLE -->
<h2>Comprehensive Dashboard</h2>

<!-- CONTENT WRAPPER -->
<div class="container">

  <table>
    <tr>
      <th>Test Name</th>
      <th>Value</th>
    </tr>

    {% for stat in stats %}
      <tr>
        <td>{{ stat.name }}</td>
        <td>{{ stat.value }}</td>
      </tr>
    {% endfor %}
  </table>

  <a href="/result" class="btn">Back to Analysis</a>

</div>

</body>
</html>
