<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Recommendations</title>

  <style>
    /* ===== BACKGROUND VIDEO ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: #000;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.75);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    /* ===== PAGE TITLE ===== */
    h2 {
      text-align: center;
      color: #ffdddd;
      font-size: 2.3rem;
      margin-top: 30px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    /* ===== GLASS CONTAINER ===== */
    .container {
      background: rgba(255,255,255,0.10);
      border-radius: 18px;
      max-width: 650px;
      width: 92%;
      margin: 40px auto;
      padding: 32px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 35px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      animation: fadeUp 1.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LIST STYLING ===== */
    ul {
      margin-top: 22px;
      padding-left: 0;
      list-style: none;
      font-size: 1.18rem;
    }

    li {
      margin-bottom: 12px;
      padding: 12px 15px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
      transition: 0.25s ease;
    }

    li:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    /* ===== ERROR BOX ===== */
    .error {
      color: #ffdcdc;
      font-weight: bold;
      border: 1px solid rgba(255,100,100,0.9);
      background: rgba(160,0,0,0.45);
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      font-size: 1.15rem;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    /* ===== BUTTON ===== */
    .btn {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      padding: 12px 26px;
      background: linear-gradient(135deg, #d10000, #7a0000);
      color: #fff;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1rem;
      box-shadow: 0 6px 22px rgba(0,0,0,0.45);
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.03);
      background: linear-gradient(135deg, #ff3333, #9e0000);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
  </style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline class="bg-video">
  <source src="static/Blood_video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- PAGE TITLE -->
<h2>Doctor Recommendations</h2>

<!-- GLASS PANEL -->
<div class="container">

  {% if error %}
    <div class="error">{{ error }}</div>
  {% else %}
    <ul>
      {% for doctor in doctors %}
        <li>{{ doctor }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  <a href="/result" class="btn">Back to Results</a>

</div>

</body>
</html>
