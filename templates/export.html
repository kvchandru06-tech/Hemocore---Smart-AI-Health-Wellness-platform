<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Export PDF</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      background: #000;
      overflow-x: hidden;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.75);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    h2 {
      text-align: center;
      color: #ffdddd;
      font-size: 2.3rem;
      margin-top: 40px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    .container {
      background: rgba(255,255,255,0.10);
      border-radius: 18px;
      max-width: 550px;
      width: 90%;
      margin: 35px auto;
      padding: 40px 34px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .btn {
      display: block;
      margin: 15px auto;
      width: fit-content;
      padding: 12px 26px;
      background: linear-gradient(135deg, #d10000, #7a0000);
      border-radius: 10px;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
  <source src="/static/Blood_video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h2>Your report was exported successfully!</h2>

<div class="container">

  {% if export_pdf %}
      <a href="{{ export_pdf }}" class="btn">Download PDF</a>
  {% else %}
      <p style="color:#ffcccc">Cannot generate PDF. Please analyze a report first.</p>
  {% endif %}

  <a href="/result" class="btn">Back to Analysis</a>

</div>

</body>
</html>
