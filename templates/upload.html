<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Blood Test Report</title>

  <style>
    /* ===== BACKGROUND VIDEO ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.75);
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      z-index: -1;
    }

    /* ===== TOP STYLISH HEADING ===== */
    .top-title {
      font-size: 2.9rem;
      font-weight: 800;
      margin-top: 25px;
      margin-bottom: 15px;
      text-align: center;
      color: #ffefef;
      letter-spacing: 1.5px;
      text-shadow: 0 0 12px rgba(255,0,0,0.8), 0 0 22px rgba(255,60,60,0.6);

      animation: glowPulse 2.5s ease-in-out infinite;
      padding: 8px 18px;
      backdrop-filter: blur(3px);
      border-radius: 14px;
    }

    @keyframes glowPulse {
      0% { text-shadow: 0 0 10px rgba(255,0,0,0.9), 0 0 25px rgba(255,80,80,0.7); }
      50% { text-shadow: 0 0 18px rgba(255,0,0,1), 0 0 40px rgba(255,110,110,0.9); }
      100% { text-shadow: 0 0 10px rgba(255,0,0,0.9), 0 0 25px rgba(255,80,80,0.7); }
    }

    /* ===== UPLOAD BOX ===== */
    .upload-box {
      background: rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 40px 42px;
      text-align: center;
      width: 420px;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      animation: fadeUp 1.2s ease;
      margin-top: 18px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: #ffe6e6;
      font-size: 1.7rem;
      margin-bottom: 25px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    /* ===== INPUT STYLING ===== */
    input[type="file"], input[type="text"] {
      width: 100%;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.20);
      color: #fff;
      font-size: 1rem;
      backdrop-filter: blur(4px);
      outline: none;
    }

    input::placeholder {
      color: #fceaea;
      opacity: 0.8;
    }

    /* ===== BUTTON ===== */
    button {
      background: linear-gradient(135deg, #d10000, #7a0000);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.08rem;
      box-shadow: 0 8px 26px rgba(0,0,0,0.45);
      transition: 0.25s ease;
      width: 100%;
    }

    button:hover {
      transform: translateY(-4px) scale(1.03);
      background: linear-gradient(135deg, #ff3333, #9e0000);
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }

  </style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video autoplay muted loop playsinline class="bg-video">
  <source src="static/Blood_video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- TOP FLOATING STYLISH HEADING -->
<div class="top-title">🩸Hemocore - Smart AI Health & Wellness platform</div>

<!-- UPLOAD CARD -->
<div class="upload-box">
  <h2>Upload Blood Test Report</h2>

  <form id="uploadForm" action="/analyze" method="post" enctype="multipart/form-data">

    <label style="color:#ffecec; font-weight:bold;">Choose PDF File:</label>
    <input type="file" id="file" name="file" accept=".pdf" required>

    <label style="color:#ffecec; font-weight:bold;">Your Query (optional):</label>
    <input type="text" id="query" name="query" placeholder="Summarize my Blood Test Report">

    <button type="submit">Analyze Report</button>
  </form>
</div>

</body>
</html>
